# Copy to /etc/nginx/sites-available/kpss-dashboard
# then: sudo ln -sf /etc/nginx/sites-available/kpss-dashboard /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /var/www/kpss-dashboard;
    index index.html;

    # Study data API (Node service, see kpss-api.service)
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA: serve index.html for client-side routes (if you add them later)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively; index.html stays fresh
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
